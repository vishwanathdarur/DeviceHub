<!DOCTYPE html>
<html>

<head>
    <title>DeviceHub Chat</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <div class="sidebar">
            <h2>DeviceHub</h2>
            <div id="user-list">
                <div class="user active">C++ Engine</div>
            </div>
        </div>

        <div class="chat">
            <div id="messages" class="messages"></div>

            <div class="input-bar">
                <input id="msgInput" type="text" placeholder="Type a message..." autocomplete="off" />
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

    </div>

    <script src="chat.js"></script>
</body>

</html>
